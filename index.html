<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockiNews — Smart Sentiments. Smarter Investments.</title>

    <!-- Google Fonts — preconnect first for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply stored theme synchronously before React mounts to prevent any flash -->
    <script>
      (function () {
        var t = localStorage.getItem('sn-theme');
        if (t !== 'dark' && t !== 'light') t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.backgroundColor = t === 'dark' ? '#0a0c0f' : '#f0f4f8';
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
